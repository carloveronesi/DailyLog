<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png?v=2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png?v=2" />
    <title>DailyLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Geist"', 'system-ui', 'sans-serif'],
              mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              si: {
                bg:         'var(--si-bg)',
                surface:    'var(--si-surface)',
                muted:      'var(--si-muted)',
                weekend:    'var(--si-weekend)',
                ink:        'var(--si-ink)',
                inkSoft:    'var(--si-inkSoft)',
                gray:       'var(--si-gray)',
                grayLight:  'var(--si-grayLight)',
                border:     'var(--si-border)',
                borderSoft: 'var(--si-borderSoft)',
                accent:     '#6366F1',
                accentDark: '#4F46E5',
                accentSoft: 'var(--si-accentSoft)',
                accentBg:   'var(--si-accentBg)',
                violet:     '#8B5CF6',
                violetSoft: 'var(--si-violetSoft)',
                rose:       '#F43F5E',
                amber:      '#F59E0B',
                amberSoft:  'var(--si-amberSoft)',
                success:    '#10B981',
              },
            },
            boxShadow: {
              si:    '0 1px 2px rgba(40,40,80,0.04), 0 4px 12px rgba(40,40,80,0.04)',
              'si-lg': '0 4px 24px rgba(40,40,80,0.08)',
              soft:  '0 16px 35px rgba(15, 23, 42, 0.12)',
              'soft-dark': '0 16px 35px rgba(0, 0, 0, 0.4)',
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --si-bg:         #F4F3FB;
        --si-surface:    #FFFFFF;
        --si-muted:      #FAFAFD;
        --si-weekend:    #EFEEF7;
        --si-ink:        #1B1B2E;
        --si-inkSoft:    #3F3F5A;
        --si-gray:       #7676A0;
        --si-grayLight:  #B0B0CC;
        --si-border:     #E7E6F2;
        --si-borderSoft: #EFEEF7;
        --si-accentBg:   #F0EFFD;
        --si-accentSoft: #E8E7FB;
        --si-violetSoft: #F1ECFE;
        --si-amberSoft:  #FEF3C7;
      }
      .dark {
        --si-bg:         #0E0E1A;
        --si-surface:    #17172B;
        --si-muted:      #13131F;
        --si-weekend:    #1B1B2E;
        --si-ink:        #E9E7FF;
        --si-inkSoft:    #B8B4E0;
        --si-gray:       #7070A0;
        --si-grayLight:  #48486A;
        --si-border:     #2B2B44;
        --si-borderSoft: #222238;
        --si-accentBg:   #1C1C38;
        --si-accentSoft: #26264A;
        --si-violetSoft: #1D1530;
        --si-amberSoft:  #271E08;
      }
      body {
        background: linear-gradient(180deg, #F6F5FC 0%, #F1F0FA 100%);
        min-height: 100vh;
      }
      .dark body {
        background: #0E0E1A;
      }
    </style>
  </head>
  <body class="text-si-ink antialiased">
    <div id="root"></div>
    <script type="module" src="./src/renderer/main.jsx"></script>
  </body>
</html>
