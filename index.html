<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png?v=2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png?v=2" />
    <title>DailyLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Geist"', 'system-ui', 'sans-serif'],
              mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              si: {
                bg:         '#F4F3FB',
                surface:    '#FFFFFF',
                muted:      '#FAFAFD',
                weekend:    '#EFEEF7',
                ink:        '#1B1B2E',
                inkSoft:    '#3F3F5A',
                gray:       '#7676A0',
                grayLight:  '#B0B0CC',
                border:     '#E7E6F2',
                borderSoft: '#EFEEF7',
                accent:     '#6366F1',
                accentDark: '#4F46E5',
                accentSoft: '#E8E7FB',
                accentBg:   '#F0EFFD',
                violet:     '#8B5CF6',
                violetSoft: '#F1ECFE',
                rose:       '#F43F5E',
                amber:      '#F59E0B',
                amberSoft:  '#FEF3C7',
                success:    '#10B981',
              },
            },
            boxShadow: {
              si:    '0 1px 2px rgba(40,40,80,0.04), 0 4px 12px rgba(40,40,80,0.04)',
              'si-lg': '0 4px 24px rgba(40,40,80,0.08)',
              soft:  '0 16px 35px rgba(15, 23, 42, 0.12)',
              'soft-dark': '0 16px 35px rgba(0, 0, 0, 0.4)',
            },
          },
        },
      };
    </script>
  </head>
  <body class="text-si-ink antialiased dark:bg-slate-900 dark:text-slate-100" style="background:linear-gradient(180deg,#F6F5FC 0%,#F1F0FA 100%);min-height:100vh">
    <div id="root"></div>
    <script type="module" src="./src/renderer/main.jsx"></script>
  </body>
</html>
