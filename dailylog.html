<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Tailwind: keep it simple and modern
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "Segoe UI", "sans-serif"],
            },
            boxShadow: {
              soft: "0 16px 35px rgba(15, 23, 42, 0.12)",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --bg-a: #f1f6ff;
        --bg-b: #e7edf7;
        --ink: #0f172a;
      }

      body {
        font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1100px 520px at -10% -20%, rgba(29, 78, 216, 0.14), transparent 58%),
          radial-gradient(900px 460px at 110% -12%, rgba(8, 145, 178, 0.14), transparent 56%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
      }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      // ----------------------
      // Utils
      // ----------------------
      const pad2 = (n) => String(n).padStart(2, "0");
      const ymd = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      const ymKey = (year, monthIndex0) => `${year}-${pad2(monthIndex0 + 1)}`;
      const sameYMD = (a, b) => ymd(a) === ymd(b);

      const monthNameIT = (monthIndex0) =>
        [
          "Gennaio",
          "Febbraio",
          "Marzo",
          "Aprile",
          "Maggio",
          "Giugno",
          "Luglio",
          "Agosto",
          "Settembre",
          "Ottobre",
          "Novembre",
          "Dicembre",
        ][monthIndex0];

      const startOfMonth = (year, monthIndex0) => new Date(year, monthIndex0, 1);
      const endOfMonth = (year, monthIndex0) => new Date(year, monthIndex0 + 1, 0);
      const daysInMonth = (year, monthIndex0) => endOfMonth(year, monthIndex0).getDate();

      // Monday-first calendar: convert JS getDay() (0=Sun..6=Sat) to (0=Mon..6=Sun)
      const dowMon0 = (d) => (d.getDay() + 6) % 7;

      // ----------------------
      // Storage (local) - one JSON blob per month
      // ----------------------
      const STORAGE_PREFIX = "dailylog:v1:";
      const SETTINGS_KEY = STORAGE_PREFIX + "__settings";
      const DEFAULT_SETTINGS = {
        desktopBackupDir: "",
      };
      const BACKUP_DB_NAME = "dailylog-backup-v1";
      const BACKUP_STORE_NAME = "settings";
      const BACKUP_HANDLE_KEY = "auto-backup-file-handle";

      function normalizeSettings(raw) {
        if (!raw || typeof raw !== "object") return { ...DEFAULT_SETTINGS };
        return {
          ...DEFAULT_SETTINGS,
          desktopBackupDir: typeof raw.desktopBackupDir === "string" ? raw.desktopBackupDir : "",
        };
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return { ...DEFAULT_SETTINGS };
          return normalizeSettings(JSON.parse(raw));
        } catch {
          return { ...DEFAULT_SETTINGS };
        }
      }

      function saveSettings(settings) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(normalizeSettings(settings)));
      }

      function collectExportData() {
        const out = {};
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(STORAGE_PREFIX)) out[k] = localStorage.getItem(k);
        }
        return out;
      }

      function loadMonthData(year, monthIndex0) {
        const key = STORAGE_PREFIX + ymKey(year, monthIndex0);
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return { byDate: {} };
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return { byDate: {} };
          if (!parsed.byDate || typeof parsed.byDate !== "object") return { byDate: {} };
          return parsed;
        } catch {
          return { byDate: {} };
        }
      }

      function saveMonthData(year, monthIndex0, data) {
        const key = STORAGE_PREFIX + ymKey(year, monthIndex0);
        localStorage.setItem(key, JSON.stringify(data));
      }

      function openBackupDb() {
        return new Promise((resolve, reject) => {
          if (!window.indexedDB) {
            reject(new Error("IndexedDB non disponibile"));
            return;
          }

          const req = window.indexedDB.open(BACKUP_DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(BACKUP_STORE_NAME)) {
              db.createObjectStore(BACKUP_STORE_NAME);
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error || new Error("Apertura IndexedDB fallita"));
        });
      }

      async function persistBackupHandle(fileHandle) {
        const db = await openBackupDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(BACKUP_STORE_NAME, "readwrite");
          tx.objectStore(BACKUP_STORE_NAME).put(fileHandle, BACKUP_HANDLE_KEY);
          tx.oncomplete = () => {
            db.close();
            resolve();
          };
          tx.onerror = () => {
            db.close();
            reject(tx.error || new Error("Salvataggio handle fallito"));
          };
          tx.onabort = () => {
            db.close();
            reject(tx.error || new Error("Salvataggio handle annullato"));
          };
        });
      }

      async function restoreBackupHandle() {
        const db = await openBackupDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(BACKUP_STORE_NAME, "readonly");
          const req = tx.objectStore(BACKUP_STORE_NAME).get(BACKUP_HANDLE_KEY);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error || new Error("Lettura handle fallita"));
          tx.oncomplete = () => db.close();
          tx.onerror = () => {
            db.close();
            reject(tx.error || new Error("Lettura handle fallita"));
          };
          tx.onabort = () => {
            db.close();
            reject(tx.error || new Error("Lettura handle annullata"));
          };
        });
      }

      async function clearPersistedBackupHandle() {
        const db = await openBackupDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(BACKUP_STORE_NAME, "readwrite");
          tx.objectStore(BACKUP_STORE_NAME).delete(BACKUP_HANDLE_KEY);
          tx.oncomplete = () => {
            db.close();
            resolve();
          };
          tx.onerror = () => {
            db.close();
            reject(tx.error || new Error("Pulizia handle fallita"));
          };
          tx.onabort = () => {
            db.close();
            reject(tx.error || new Error("Pulizia handle annullata"));
          };
        });
      }

      function exportAll() {
        const out = collectExportData();
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `dailylog_export_${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function ensureFilePermission(fileHandle) {
        try {
          const opts = { mode: "readwrite" };
          if ((await fileHandle.queryPermission(opts)) === "granted") return true;
          if ((await fileHandle.requestPermission(opts)) === "granted") return true;
          return false;
        } catch {
          return false;
        }
      }

      async function writeBackupToFile(fileHandle) {
        const payload = JSON.stringify(collectExportData(), null, 2);
        const writable = await fileHandle.createWritable();
        await writable.write(payload);
        await writable.close();
      }

      async function importAll(file) {
        const text = await file.text();
        const obj = JSON.parse(text);
        if (!obj || typeof obj !== "object") throw new Error("Formato JSON non valido");
        const keys = Object.keys(obj);
        let count = 0;
        for (const k of keys) {
          if (k.startsWith(STORAGE_PREFIX) && typeof obj[k] === "string") {
            localStorage.setItem(k, obj[k]);
            count++;
          }
        }
        return count;
      }

      // ----------------------
      // Domain
      // ----------------------
      const TASK_TYPES = [
        { id: "internal", label: "Task interni" },
        { id: "client", label: "Task per cliente" },
        { id: "vacation", label: "Ferie" },
        { id: "event", label: "Evento" },
      ];

      const SLOT = {
        AM: "AM",
        PM: "PM",
      };

      // Entry per slot:
      // {
      //   type: 'internal'|'client'|'vacation'|'event',
      //   title: string,
      //   client: string,
      //   notes: string,
      // }

      function defaultEntry() {
        return {
          type: "internal",
          title: "",
          client: "",
          notes: "",
        };
      }

      function badgeStyle(type) {
        switch (type) {
          case "vacation":
            return "bg-emerald-100 text-emerald-800";
          case "event":
            return "bg-purple-100 text-purple-800";
          case "client":
            return "bg-blue-100 text-blue-800";
          default:
            return "bg-slate-200 text-slate-800";
        }
      }

      function displayLabel(entry) {
        if (!entry) return "";
        if (entry.type === "client") {
          const c = (entry.client || "").trim();
          if (c) return c;
        }
        if (entry.type === "vacation") return "Ferie";
        if (entry.type === "event") return entry.title?.trim() ? entry.title.trim() : "Evento";
        return entry.title?.trim() ? entry.title.trim() : "Internal";
      }

      // ----------------------
      // UI components
      // ----------------------
      function Button({ children, className = "", ...props }) {
        return (
          <button
            className={
              "inline-flex items-center justify-center rounded-2xl px-3.5 py-2.5 text-sm font-semibold tracking-tight " +
              "border border-transparent shadow-sm transition-all duration-200 hover:-translate-y-[1px] " +
              "focus:outline-none focus:ring-2 focus:ring-sky-300/60 disabled:opacity-50 disabled:cursor-not-allowed " +
              className
            }
            {...props}
          >
            {children}
          </button>
        );
      }

      function Icon({ name, className = "" }) {
        const common = "w-5 h-5 " + className;
        if (name === "chev-left")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          );
        if (name === "chev-right")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M9 18l6-6-6-6" />
            </svg>
          );
        if (name === "download")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M12 3v12" />
              <path d="M7 10l5 5 5-5" />
              <path d="M5 21h14" />
            </svg>
          );
        if (name === "upload")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M12 21V9" />
              <path d="M7 14l5-5 5 5" />
              <path d="M5 3h14" />
            </svg>
          );
        if (name === "trash")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
            </svg>
          );
        if (name === "settings")
          return (
            <svg className={common} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          );
        return null;
      }

      function Modal({ open, title, children, onClose }) {
        useEffect(() => {
          if (!open) return;
          const onKey = (e) => {
            if (e.key === "Escape") onClose?.();
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [open, onClose]);

        if (!open) return null;
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-slate-950/35 backdrop-blur-sm" onClick={onClose} />
            <div className="relative w-full max-w-2xl rounded-3xl bg-white/95 backdrop-blur border border-slate-200 shadow-soft">
              <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200">
                <div className="text-base font-semibold">{title}</div>
                <button
                  className="rounded-lg px-2 py-1 text-slate-500 hover:bg-slate-100"
                  onClick={onClose}
                  aria-label="Chiudi"
                >
                  ×
                </button>
              </div>
              <div className="p-5">{children}</div>
            </div>
          </div>
        );
      }

      function Segmented({ value, onChange, options }) {
        return (
          <div className="inline-flex rounded-2xl border border-slate-200/90 bg-slate-100/80 p-1">
            {options.map((opt) => (
              <button
                key={opt.value}
                className={
                  "px-3 py-1.5 text-sm font-semibold rounded-xl transition " +
                  (value === opt.value
                    ? "bg-white text-slate-900 shadow-sm"
                    : "text-slate-600 hover:bg-white/80")
                }
                onClick={() => onChange(opt.value)}
                type="button"
              >
                {opt.label}
              </button>
            ))}
          </div>
        );
      }

      function DayCell({ date, isCurrentMonth, isWeekend, entries, onClick }) {
        const d = date.getDate();
        const am = entries?.AM;
        const pm = entries?.PM;
        const isFullDay = am && pm && JSON.stringify(am) === JSON.stringify(pm);

        const base =
          "rounded-[22px] border p-3 transition-all duration-200 cursor-pointer select-none min-h-[132px] flex flex-col gap-2";
        const bg = !isCurrentMonth
          ? "bg-slate-300/70 border-slate-400 text-slate-600"
          : "bg-white/88 border-slate-200/90 hover:shadow-soft hover:-translate-y-[1px]";

        const dayNumCls = !isCurrentMonth
          ? "text-sm font-semibold text-slate-600"
          : "text-sm font-semibold " + (isWeekend ? "text-rose-600" : "text-slate-700");

        return (
          <div className={base + " " + bg} onClick={onClick}>
            <div className="flex items-center justify-between">
              <div className={dayNumCls}>{d}</div>
              {isCurrentMonth && (am || pm) ? (
                <div className="rounded-full bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-500">modifica</div>
              ) : null}
            </div>

            <div className="flex flex-1 flex-col gap-2">
              {isFullDay ? (
                <div className="flex-1 rounded-2xl bg-gradient-to-br from-slate-50 to-white px-2.5 py-2.5 flex items-center justify-center">
                  <div
                    className={
                      "inline-flex max-w-full truncate rounded-xl px-3 py-1.5 text-sm font-semibold " +
                      badgeStyle(am.type)
                    }
                  >
                    {displayLabel(am)}
                  </div>
                </div>
              ) : (
                <>
                  {am ? (
                    <div className="rounded-xl bg-slate-50/90 px-2 py-2">
                      <div
                        className={
                          "inline-flex max-w-full truncate rounded-lg px-2 py-1 text-xs font-semibold " +
                          badgeStyle(am.type)
                        }
                      >
                        {displayLabel(am)}
                      </div>
                    </div>
                  ) : null}

                  {pm ? (
                    <div className="rounded-xl bg-slate-50/90 px-2 py-2">
                      <div
                        className={
                          "inline-flex max-w-full truncate rounded-lg px-2 py-1 text-xs font-semibold " +
                          badgeStyle(pm.type)
                        }
                      >
                        {displayLabel(pm)}
                      </div>
                    </div>
                  ) : null}
                </>
              )}
            </div>
          </div>
        );
      }

      function Editor({ date, existingEntries, onSave, onDeleteDay, topClients = [] }) {
        const [mode, setMode] = useState("half"); // 'half'|'full'
        const [slot, setSlot] = useState(SLOT.AM);

        const [entryAM, setEntryAM] = useState(existingEntries?.AM || defaultEntry());
        const [entryPM, setEntryPM] = useState(existingEntries?.PM || defaultEntry());

        useEffect(() => {
          setEntryAM(existingEntries?.AM || defaultEntry());
          setEntryPM(existingEntries?.PM || defaultEntry());
          // heuristics: if AM and PM are equal, default to full-day
          const eq = JSON.stringify(existingEntries?.AM || null) === JSON.stringify(existingEntries?.PM || null);
          setMode(existingEntries?.AM && existingEntries?.PM && eq ? "full" : "half");
        }, [existingEntries]);

        const active = slot === SLOT.AM ? entryAM : entryPM;
        const setActive = (next) => (slot === SLOT.AM ? setEntryAM(next) : setEntryPM(next));

        const setField = (k, v) => setActive({ ...active, [k]: v });

        function normalizeForType(e) {
          const t = e.type;
          const out = { ...e };
          if (t !== "client") out.client = "";
          if (t === "vacation") {
            if (!out.title.trim()) out.title = "Ferie";
          }
          if (t === "internal") {
            if (!out.title.trim()) out.title = "Internal";
          }
          if (t === "event") {
            if (!out.title.trim()) out.title = "Evento";
          }
          return out;
        }

        function handleSave() {
          if (mode === "full") {
            // Copy AM to PM for full day, using current slot entry as the source
            const source = normalizeForType(active);
            onSave({ AM: source, PM: source });
            return;
          }

          // half: save each slot independently, but allow empty slot (treated as null)
          const clean = (e) => {
            const hasMeaning =
              (e.title && e.title.trim()) ||
              (e.client && e.client.trim()) ||
              (e.notes && e.notes.trim()) ||
              e.type === "vacation";
            if (!hasMeaning) return null;
            return normalizeForType(e);
          };

          onSave({ AM: clean(entryAM), PM: clean(entryPM) });
        }

        const fmt = (d) => {
          const dd = pad2(d.getDate());
          const mm = pad2(d.getMonth() + 1);
          const yy = d.getFullYear();
          return `${dd}/${mm}/${yy}`;
        };

        return (
          <div className="space-y-4">
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div className="text-sm text-slate-600">{fmt(date)}</div>
              <Segmented
                value={mode}
                onChange={setMode}
                options={[
                  { value: "half", label: "0.5 giornata" },
                  { value: "full", label: "1 giornata" },
                ]}
              />
            </div>

            {mode === "half" ? (
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div className="text-sm font-semibold text-slate-700">Modifica slot</div>
                <Segmented
                  value={slot}
                  onChange={setSlot}
                  options={[
                    { value: SLOT.AM, label: "Mattina" },
                    { value: SLOT.PM, label: "Pomeriggio" },
                  ]}
                />
              </div>
            ) : (
              <div className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">
                Stai salvando una voce per l'intera giornata (mattina e pomeriggio).
              </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700">Tipo</label>
                <select
                  className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm"
                  value={active.type}
                  onChange={(e) => setField("type", e.target.value)}
                >
                  {TASK_TYPES.map((t) => (
                    <option key={t.id} value={t.id}>
                      {t.label}
                    </option>
                  ))}
                </select>
              </div>

              {active.type === "client" ? (
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700">Cliente</label>
                  <input
                    className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm"
                    value={active.client}
                    onChange={(e) => setField("client", e.target.value)}
                    placeholder="Es. Generali"
                  />
                  {topClients.length > 0 ? (
                    <div className="flex flex-wrap gap-2 pt-1">
                      {topClients.map((clientName) => {
                        const isSelected =
                          (active.client || "").trim().toLowerCase() === clientName.toLowerCase();
                        return (
                          <button
                            key={clientName}
                            type="button"
                            onClick={() => setField("client", clientName)}
                            className={
                              "rounded-full px-2.5 py-1 text-xs font-semibold transition " +
                              (isSelected
                                ? "bg-blue-600 text-white"
                                : "bg-blue-50 text-blue-700 hover:bg-blue-100")
                            }
                            title={`Usa cliente ${clientName}`}
                          >
                            {clientName}
                          </button>
                        );
                      })}
                    </div>
                  ) : null}
                </div>
              ) : (
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700">Titolo</label>
                  <input
                    className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm"
                    value={active.title}
                    onChange={(e) => setField("title", e.target.value)}
                    placeholder={active.type === "event" ? "Es. Meetup" : "Es. Support"}
                  />
                </div>
              )}
            </div>

            <div className="space-y-2">
              <label className="text-sm font-semibold text-slate-700">Note</label>
              <textarea
                className="w-full min-h-[110px] rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm"
                value={active.notes}
                onChange={(e) => setField("notes", e.target.value)}
                placeholder="Cosa è successo oggi, cosa hai fatto, prossimi step..."
              />
            </div>

            <div className="flex items-center justify-between gap-3">
              <Button
                className="bg-slate-900 text-white hover:bg-slate-800"
                onClick={handleSave}
                type="button"
              >
                Salva
              </Button>

              <Button
                className="bg-white text-slate-700 border border-slate-200 hover:bg-slate-50"
                onClick={onDeleteDay}
                type="button"
                title="Cancella tutte le voci del giorno"
              >
                <Icon name="trash" className="mr-2" />
                Cancella giorno
              </Button>
            </div>

            {mode === "half" ? (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                  <div className="text-xs font-semibold text-slate-500">Anteprima Mattina</div>
                  {entryAM ? (
                    <div className={"mt-1 inline-flex rounded-lg px-2 py-1 text-xs font-semibold " + badgeStyle(entryAM.type)}>
                      {displayLabel(entryAM)}
                    </div>
                  ) : null}
                </div>
                <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                  <div className="text-xs font-semibold text-slate-500">Anteprima Pomeriggio</div>
                  {entryPM ? (
                    <div className={"mt-1 inline-flex rounded-lg px-2 py-1 text-xs font-semibold " + badgeStyle(entryPM.type)}>
                      {displayLabel(entryPM)}
                    </div>
                  ) : null}
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      function SummaryPanel({ year, monthIndex0, data }) {
        const totals = useMemo(() => {
          const byClient = new Map();
          let internal = 0;
          let vacation = 0;
          let event = 0;

          const byDate = data?.byDate || {};
          for (const dateKey of Object.keys(byDate)) {
            const day = byDate[dateKey];
            for (const s of [SLOT.AM, SLOT.PM]) {
              const e = day?.[s];
              if (!e) continue;
              const weight = 0.5;
              if (e.type === "client") {
                const c = (e.client || "(senza nome)").trim() || "(senza nome)";
                byClient.set(c, (byClient.get(c) || 0) + weight);
              } else if (e.type === "internal") {
                internal += weight;
              } else if (e.type === "vacation") {
                vacation += weight;
              } else if (e.type === "event") {
                event += weight;
              }
            }
          }

          const clients = Array.from(byClient.entries())
            .map(([client, days]) => ({ client, days }))
            .sort((a, b) => b.days - a.days);

          return { clients, internal, vacation, event };
        }, [data]);

        return (
          <div className="rounded-3xl border border-slate-200/90 bg-white/85 backdrop-blur p-4 shadow-soft">
            <div className="flex items-center justify-between">
              <div>
                <div className="text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Riepilogo mese</div>
                <div className="mt-1 text-lg font-bold tracking-tight">{monthNameIT(monthIndex0)} {year}</div>
              </div>
            </div>

            <div className="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
              <div className="rounded-2xl border border-slate-200/90 bg-white/80 p-3">
                <div className="text-xs font-semibold text-slate-500">Internal</div>
                <div className="mt-1 text-lg font-bold">{totals.internal.toFixed(1)} gg</div>
              </div>
              <div className="rounded-2xl border border-slate-200/90 bg-white/80 p-3">
                <div className="text-xs font-semibold text-slate-500">Ferie</div>
                <div className="mt-1 text-lg font-bold">{totals.vacation.toFixed(1)} gg</div>
              </div>
              <div className="rounded-2xl border border-slate-200/90 bg-white/80 p-3">
                <div className="text-xs font-semibold text-slate-500">Eventi</div>
                <div className="mt-1 text-lg font-bold">{totals.event.toFixed(1)} gg</div>
              </div>
            </div>

            <div className="mt-4">
              <div className="text-sm font-semibold text-slate-700">Clienti</div>
              {totals.clients.length === 0 ? (
                <div className="mt-2 text-sm text-slate-500">Nessuna giornata cliente registrata.</div>
              ) : (
                <div className="mt-2 space-y-2">
                  {totals.clients.map((c) => (
                    <div key={c.client} className="flex items-center justify-between rounded-2xl border border-slate-200/90 bg-white/90 px-3 py-2">
                      <div className="text-sm font-semibold text-slate-800 truncate">{c.client}</div>
                      <div className="text-sm font-bold text-slate-900">{c.days.toFixed(1)} gg</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="mt-4 text-xs text-slate-500">
              Nota: 1 slot (mattina/pomeriggio) vale 0.5 giornata.
            </div>
          </div>
        );
      }

      function App() {
        const today = new Date();
        const hasDesktopBridge = Boolean(window.dailylogDesktop && window.dailylogDesktop.isDesktop);
        const [year, setYear] = useState(today.getFullYear());
        const [month, setMonth] = useState(today.getMonth());

        const [data, setData] = useState(() => loadMonthData(year, month));
        const [settings, setSettings] = useState(() => loadSettings());

        const [selectedDate, setSelectedDate] = useState(null);
        const [editorOpen, setEditorOpen] = useState(false);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [settingsStatus, setSettingsStatus] = useState("");
        const [backupFileHandle, setBackupFileHandle] = useState(null);
        const [backupStatus, setBackupStatus] = useState("Backup automatico non attivo");
        const [desktopBackupPath, setDesktopBackupPath] = useState("");
        const [desktopBackupStatus, setDesktopBackupStatus] = useState(
          hasDesktopBridge ? "Backup desktop in inizializzazione..." : ""
        );
        const fileInputRef = useRef(null);
        const supportsAutoBackup = typeof window.showSaveFilePicker === "function";
        const supportsHandlePersistence = supportsAutoBackup && typeof window.indexedDB !== "undefined";

        useEffect(() => {
          const loaded = loadMonthData(year, month);
          setData(loaded);
        }, [year, month]);

        useEffect(() => {
          saveSettings(settings);
        }, [settings]);

        // Persist on data change
        useEffect(() => {
          saveMonthData(year, month, data);
        }, [data, year, month]);

        // Desktop app: initialize auto-backup target path
        useEffect(() => {
          if (!hasDesktopBridge) return;
          let cancelled = false;

          (async () => {
            try {
              const filePath = await window.dailylogDesktop.getAutoBackupPath(settings.desktopBackupDir);
              if (cancelled) return;
              setDesktopBackupPath(filePath || "");
            } catch (err) {
              if (!cancelled) {
                setDesktopBackupStatus(`Backup desktop non disponibile: ${err?.message || err}`);
              }
            }
          })();

          return () => {
            cancelled = true;
          };
        }, [hasDesktopBridge, settings.desktopBackupDir]);

        // Desktop app: write backup in configured desktop folder at every data change
        useEffect(() => {
          if (!hasDesktopBridge) return;
          let cancelled = false;

          (async () => {
            try {
              const payload = JSON.stringify(collectExportData(), null, 2);
              const result = await window.dailylogDesktop.writeAutoBackup(payload, settings.desktopBackupDir);
              if (cancelled) return;
              if (result?.filePath) setDesktopBackupPath(result.filePath);
              setDesktopBackupStatus(`Backup desktop aggiornato alle ${new Date().toLocaleTimeString("it-IT")}`);
            } catch (err) {
              if (!cancelled) {
                setDesktopBackupStatus(`Backup desktop in errore: ${err?.message || err}`);
              }
            }
          })();

          return () => {
            cancelled = true;
          };
        }, [hasDesktopBridge, data, year, month, settings.desktopBackupDir]);

        // Optional auto-backup on file
        useEffect(() => {
          if (hasDesktopBridge) return;
          if (!backupFileHandle) return;
          let cancelled = false;

          (async () => {
            try {
              const allowed = await ensureFilePermission(backupFileHandle);
              if (!allowed) throw new Error("permesso file negato");
              await writeBackupToFile(backupFileHandle);
              if (!cancelled) {
                const hhmmss = new Date().toLocaleTimeString("it-IT");
                setBackupStatus(`Backup aggiornato alle ${hhmmss}`);
              }
            } catch (err) {
              if (!cancelled) {
                setBackupStatus(`Backup in errore: ${err?.message || err}`);
              }
            }
          })();

          return () => {
            cancelled = true;
          };
        }, [hasDesktopBridge, backupFileHandle, data, year, month]);

        // Restore persisted backup file handle across sessions
        useEffect(() => {
          if (hasDesktopBridge) return;
          if (!supportsHandlePersistence) return;
          let cancelled = false;

          (async () => {
            try {
              const handle = await restoreBackupHandle();
              if (!handle || cancelled) return;
              setBackupFileHandle(handle);
              setBackupStatus("Backup auto ripristinato");
            } catch (err) {
              if (!cancelled) {
                setBackupStatus(`Backup non ripristinato: ${err?.message || err}`);
              }
            }
          })();

          return () => {
            cancelled = true;
          };
        }, [hasDesktopBridge, supportsHandlePersistence]);

        const gridDates = useMemo(() => {
          const first = startOfMonth(year, month);
          const totalDays = daysInMonth(year, month);

          // start from Monday of the first week
          const startOffset = dowMon0(first); // 0..6
          const start = new Date(year, month, 1 - startOffset);

          const cells = [];
          for (let i = 0; i < 42; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            cells.push(d);
          }
          return cells;
        }, [year, month]);

        const monthDataByDate = data?.byDate || {};
        const topMonthClients = useMemo(() => {
          const countByClient = new Map();
          for (const dateKey of Object.keys(monthDataByDate)) {
            const day = monthDataByDate[dateKey];
            for (const s of [SLOT.AM, SLOT.PM]) {
              const e = day?.[s];
              if (!e || e.type !== "client") continue;
              const clientName = (e.client || "").trim();
              if (!clientName) continue;
              countByClient.set(clientName, (countByClient.get(clientName) || 0) + 1);
            }
          }

          return Array.from(countByClient.entries())
            .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "it"))
            .slice(0, 3)
            .map(([clientName]) => clientName);
        }, [monthDataByDate]);

        function openEditor(date) {
          setSelectedDate(date);
          setEditorOpen(true);
        }

        function closeEditor() {
          setEditorOpen(false);
          setSelectedDate(null);
        }

        function upsertDay(date, entries) {
          const key = ymd(date);
          setData((prev) => {
            const next = { ...prev, byDate: { ...(prev.byDate || {}) } };
            const normalized = {
              AM: entries.AM || null,
              PM: entries.PM || null,
            };
            // If both slots are null, delete day
            if (!normalized.AM && !normalized.PM) {
              delete next.byDate[key];
            } else {
              next.byDate[key] = normalized;
            }
            return next;
          });
          closeEditor();
        }

        function deleteDay(date) {
          const key = ymd(date);
          setData((prev) => {
            const next = { ...prev, byDate: { ...(prev.byDate || {}) } };
            delete next.byDate[key];
            return next;
          });
          closeEditor();
        }

        function prevMonth() {
          const d = new Date(year, month, 1);
          d.setMonth(d.getMonth() - 1);
          setYear(d.getFullYear());
          setMonth(d.getMonth());
        }

        function nextMonth() {
          const d = new Date(year, month, 1);
          d.setMonth(d.getMonth() + 1);
          setYear(d.getFullYear());
          setMonth(d.getMonth());
        }

        function goToday() {
          setYear(today.getFullYear());
          setMonth(today.getMonth());
        }

        async function handleImport(e) {
          const f = e.target.files?.[0];
          if (!f) return;
          try {
            const count = await importAll(f);
            alert(`Import completato. Voci aggiornate: ${count}`);
            // reload current
            setData(loadMonthData(year, month));
          } catch (err) {
            alert(`Import fallito: ${err?.message || err}`);
          } finally {
            e.target.value = "";
          }
        }

        async function enableAutoBackup() {
          if (!supportsAutoBackup) {
            alert("Browser non compatibile con salvataggio automatico su file. Usa Export manuale.");
            return;
          }

          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: `dailylog_backup_${new Date().toISOString().slice(0, 10)}.json`,
              types: [
                {
                  description: "JSON backup",
                  accept: { "application/json": [".json"] },
                },
              ],
            });

            const allowed = await ensureFilePermission(handle);
            if (!allowed) {
              alert("Permesso di scrittura non concesso.");
              return;
            }

            if (supportsHandlePersistence) {
              await persistBackupHandle(handle);
            }
            setBackupFileHandle(handle);
            await writeBackupToFile(handle);
            setBackupStatus(`Backup aggiornato alle ${new Date().toLocaleTimeString("it-IT")}`);
          } catch (err) {
            if (err?.name === "AbortError") return;
            alert(`Configurazione backup fallita: ${err?.message || err}`);
          }
        }

        async function disableAutoBackup() {
          if (supportsHandlePersistence) {
            try {
              await clearPersistedBackupHandle();
            } catch {
              // keep going: local toggle should still work
            }
          }
          setBackupFileHandle(null);
          setBackupStatus("Backup automatico non attivo");
        }

        async function pickDesktopBackupDir() {
          if (!hasDesktopBridge) return;
          setSettingsStatus("");
          try {
            const selected = await window.dailylogDesktop.pickBackupDirectory(settings.desktopBackupDir);
            if (!selected) return;
            setSettings((prev) => ({ ...prev, desktopBackupDir: selected }));
            setSettingsStatus("Cartella backup aggiornata.");
          } catch (err) {
            setSettingsStatus(`Errore selezione cartella: ${err?.message || err}`);
          }
        }

        function useDefaultDesktopBackupDir() {
          setSettings((prev) => ({ ...prev, desktopBackupDir: "" }));
          setSettingsStatus("Ripristinato percorso predefinito.");
        }

        const weekDays = ["Lun", "Mar", "Mer", "Gio", "Ven", "Sab", "Dom"];

        const selectedKey = selectedDate ? ymd(selectedDate) : null;
        const existingEntries = selectedKey ? monthDataByDate[selectedKey] : null;

        return (
          <div className="min-h-screen">
            <div className="mx-auto max-w-7xl px-4 py-6 lg:px-6">
              <header className="rounded-3xl border border-slate-200/90 bg-white/70 backdrop-blur px-4 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                  <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">DailyLog</div>
                  <h1 className="text-3xl font-extrabold tracking-tight">{monthNameIT(month)} {year}</h1>
                </div>

                <div className="flex items-center gap-2 flex-wrap">
                  <Button className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white" onClick={prevMonth} type="button">
                    <Icon name="chev-left" />
                  </Button>
                  <Button className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white" onClick={nextMonth} type="button">
                    <Icon name="chev-right" />
                  </Button>
                  <Button className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white" onClick={goToday} type="button">
                    Oggi
                  </Button>

                  <Button
                    className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white"
                    onClick={() => setSettingsOpen(true)}
                    type="button"
                    title="Impostazioni"
                  >
                    <Icon name="settings" className="mr-2" />
                    Settings
                  </Button>

                  <div className="w-px h-8 bg-slate-200 mx-1" />

                  <Button className="bg-slate-900 text-white hover:bg-slate-800" onClick={exportAll} type="button" title="Esporta backup JSON">
                    <Icon name="download" className="mr-2" />
                    Export
                  </Button>

                  <Button
                    className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white"
                    onClick={() => fileInputRef.current?.click()}
                    type="button"
                    title="Importa backup JSON"
                  >
                    <Icon name="upload" className="mr-2" />
                    Import
                  </Button>
                  <input ref={fileInputRef} type="file" accept="application/json" className="hidden" onChange={handleImport} />

                  {!hasDesktopBridge ? (
                    <Button
                      className={
                        backupFileHandle
                          ? "bg-emerald-600 text-white hover:bg-emerald-500"
                          : "bg-white/95 border border-slate-200 text-slate-800 hover:bg-white"
                      }
                      onClick={backupFileHandle ? disableAutoBackup : enableAutoBackup}
                      type="button"
                      title={
                        backupFileHandle
                          ? "Disattiva backup automatico su file"
                          : "Collega file per backup automatico"
                      }
                      disabled={!supportsAutoBackup && !backupFileHandle}
                    >
                      {backupFileHandle ? "Backup attivo" : "Backup auto"}
                    </Button>
                  ) : null}
                </div>
              </header>

              <main className="mt-6 grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-5">
                <section className="rounded-3xl border border-slate-200/90 bg-white/80 backdrop-blur p-5 shadow-soft">
                  <div className="grid grid-cols-7 gap-2">
                    {weekDays.map((w) => (
                      <div key={w} className="px-2 py-1 text-[11px] font-semibold uppercase tracking-[0.12em] text-slate-500">
                        {w}
                      </div>
                    ))}
                  </div>

                  <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-2.5">
                    {gridDates.map((d) => {
                      const isCurrentMonth = d.getMonth() === month && d.getFullYear() === year;
                      const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                      const key = ymd(d);
                      const entries = monthDataByDate[key] || null;
                      return (
                        <DayCell
                          key={key}
                          date={d}
                          isCurrentMonth={isCurrentMonth}
                          isWeekend={isWeekend}
                          entries={entries}
                          onClick={() => openEditor(d)}
                        />
                      );
                    })}
                  </div>

                  <div className="mt-4 text-xs text-slate-500">
                    Weekend evidenziati in rosso. Click su un giorno per inserire o modificare (0.5 o 1 giornata).
                  </div>
                </section>

                <aside className="space-y-4">
                  <SummaryPanel year={year} monthIndex0={month} data={data} />

                  <div className="rounded-3xl border border-slate-200/90 bg-white/85 backdrop-blur p-4 shadow-soft">
                    <div className="text-sm font-semibold text-slate-700">Legenda</div>
                    <div className="mt-3 flex flex-wrap gap-2">
                      {TASK_TYPES.map((t) => (
                        <div key={t.id} className={"rounded-lg px-2 py-1 text-xs font-semibold " + badgeStyle(t.id)}>
                          {t.label}
                        </div>
                      ))}
                    </div>
                    <div className="mt-3 text-xs text-slate-500">
                      Dati salvati in locale nel browser (localStorage). Fai Export ogni tanto per backup.
                    </div>
                    {!hasDesktopBridge ? (
                      <div className="mt-2 text-xs text-slate-500">
                        {supportsAutoBackup ? backupStatus : "Backup auto su file non supportato da questo browser."}
                      </div>
                    ) : null}
                    {hasDesktopBridge ? <div className="mt-2 text-xs text-slate-500">{desktopBackupStatus}</div> : null}
                    {hasDesktopBridge && desktopBackupPath ? (
                      <div className="mt-1 break-all text-[11px] text-slate-500">Percorso backup desktop: {desktopBackupPath}</div>
                    ) : null}
                  </div>
                </aside>
              </main>
            </div>

            <Modal open={settingsOpen} title="Settings" onClose={() => setSettingsOpen(false)}>
              <div className="space-y-4">
                <div className="text-sm text-slate-600">
                  Qui puoi configurare preferenze dell'app. Per ora c'e solo il percorso backup desktop.
                </div>

                {hasDesktopBridge ? (
                  <div className="rounded-2xl border border-slate-200 bg-white p-4 space-y-3">
                    <div className="text-sm font-semibold text-slate-800">Percorso salvataggi backup</div>
                    <div className="text-xs text-slate-500">
                      Se vuoto, viene usata la cartella predefinita in Documenti.
                    </div>
                    <div className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs break-all text-slate-700">
                      {settings.desktopBackupDir || "(predefinito: Documenti\\DailyLog\\backup)"}
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <Button
                        className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white"
                        onClick={pickDesktopBackupDir}
                        type="button"
                      >
                        Scegli cartella
                      </Button>
                      <Button
                        className="bg-white/95 border border-slate-200 text-slate-800 hover:bg-white"
                        onClick={useDefaultDesktopBackupDir}
                        type="button"
                      >
                        Usa predefinito
                      </Button>
                    </div>
                    {settingsStatus ? <div className="text-xs text-slate-500">{settingsStatus}</div> : null}
                    {desktopBackupPath ? (
                      <div className="text-xs text-slate-500 break-all">File backup: {desktopBackupPath}</div>
                    ) : null}
                  </div>
                ) : (
                  <div className="rounded-2xl border border-slate-200 bg-white p-4 text-sm text-slate-600">
                    Le impostazioni backup cartella sono disponibili solo nella versione desktop Electron.
                  </div>
                )}

                <div className="pt-2">
                  <Button
                    className="bg-slate-900 text-white hover:bg-slate-800"
                    onClick={() => setSettingsOpen(false)}
                    type="button"
                  >
                    Chiudi
                  </Button>
                </div>
              </div>
            </Modal>

            <Modal
              open={editorOpen}
              title={selectedDate ? `Modifica giornata` : "Modifica"}
              onClose={closeEditor}
            >
              {selectedDate ? (
                <Editor
                  date={selectedDate}
                  existingEntries={existingEntries}
                  onSave={(entries) => upsertDay(selectedDate, entries)}
                  onDeleteDay={() => deleteDay(selectedDate)}
                  topClients={topMonthClients}
                />
              ) : null}
            </Modal>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
