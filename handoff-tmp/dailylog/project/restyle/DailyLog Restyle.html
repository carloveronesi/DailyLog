<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>DailyLog — Restyle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0E1014; }
    body { font-family: "Geist", "Inter", system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="ui-shared.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variant-a.jsx"></script>
  <script type="text/babel" src="variant-b.jsx"></script>
  <script type="text/babel" src="variant-c.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, VariantA, VariantB, VariantC } = window;

    // Artboard size — full app at desktop scale.
    const W = 1320, H = 820;

    function App() {
      return (
        <DesignCanvas title="DailyLog · Restyle" subtitle="3 direzioni visive · 4 viste per direzione">
          <DCSection id="A" title="A — Plex Editorial" subtitle="IBM Plex (Sans + Serif + Mono) · warm off-white · hairline · Things-style colored bar">
            <DCArtboard id="a-month"  label="Mese" width={W} height={H}><VariantA view="month" /></DCArtboard>
            <DCArtboard id="a-week"   label="Settimana" width={W} height={H}><VariantA view="week" /></DCArtboard>
            <DCArtboard id="a-day"    label="Giorno + To-do" width={W} height={H}><VariantA view="day" /></DCArtboard>
            <DCArtboard id="a-editor" label="Editor voce" width={W} height={H}><VariantA view="editor" /></DCArtboard>
          </DCSection>

          <DCSection id="B" title="B — Geist Console" subtitle="Geist Sans + Mono · Vercel/Linear · denso · accenti // mono · color-bar in alto">
            <DCArtboard id="b-month"  label="Mese" width={W} height={H}><VariantB view="month" /></DCArtboard>
            <DCArtboard id="b-week"   label="Settimana" width={W} height={H}><VariantB view="week" /></DCArtboard>
            <DCArtboard id="b-day"    label="Giorno + To-do" width={W} height={H}><VariantB view="day" /></DCArtboard>
            <DCArtboard id="b-editor" label="Editor voce" width={W} height={H}><VariantB view="editor" /></DCArtboard>
          </DCSection>

          <DCSection id="C" title="C — Soft Indigo" subtitle="Geist Sans · indigo→violet · superfici morbide · pill · dashboard moderno">
            <DCArtboard id="c-month"  label="Mese" width={W} height={H}><VariantC view="month" /></DCArtboard>
            <DCArtboard id="c-week"   label="Settimana" width={W} height={H}><VariantC view="week" /></DCArtboard>
            <DCArtboard id="c-day"    label="Giorno + To-do" width={W} height={H}><VariantC view="day" /></DCArtboard>
            <DCArtboard id="c-editor" label="Editor voce" width={W} height={H}><VariantC view="editor" /></DCArtboard>
            <DCArtboard id="c-projects" label="Progetti" width={W} height={H}><VariantC view="projects" /></DCArtboard>
            <DCArtboard id="c-settings" label="Impostazioni" width={W} height={H}><VariantC view="settings" /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
